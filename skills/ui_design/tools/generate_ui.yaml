name: taste_generate_ui
description: Generate UI component code based on design profile
inputs:
  component:
    type: string
    description: Component type (button, card, nav, form, table)
  profile:
    type: string
    enum: [minimal, premium, modern, technical]
  properties:
    type: object
output:
  type: object
  properties:
    html:
      type: string
    css:
      type: string
